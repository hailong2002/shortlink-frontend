name: CI/CD ShortLink app
on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: 'true'
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/shortlink-fe:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
           host: ${{ secrets.SERVER_HOST }}
           port: ${{ secrets.SERVER_PORT }}
           username: ${{ secrets.SERVER_USERNAME }}
           password: ${{ secrets.SERVER_PASSWORD }}
           script: |
             mkdir -p /home/${{ secrets.SERVER_USERNAME }}/shortlink-app-fe
             cd /home/${{ secrets.SERVER_USERNAME }}/shortlink-app-fe
             docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/shortlink-fe:latest
             docker compose down
             docker compose up -d
             docker image prune -f










