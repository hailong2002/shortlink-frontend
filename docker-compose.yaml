services:
  app:
    image: ${DOCKER_HUB_USERNAME}/shortlink-fe:latest
    container_name: shortlink-app-fe
    restart: on-failure
    networks:
      - nginx-network
    volumes:
      - ./nginx-fe.conf:/etc/nginx/conf.d/default.conf
    # ports:
    #   - 3000:3000

volumes:
  db_data:

networks:
  nginx-network:
    name: nginx-network
    external: true